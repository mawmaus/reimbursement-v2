<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cibes Reimbursement Portal</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- LOGIN -->
<div id="loginView" class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <img class="logo logo-lg" src="logo.svg" alt="Cibes" />
      <div>
        <h1>Reimbursement Portal</h1>
        <p class="muted">Sign in to submit, approve, or process claims.</p>
      </div>
    </div>
    <form id="loginForm" class="form" autocomplete="on">
      <label>Username
        <input name="username" type="text" required autocomplete="username" />
      </label>
      <label>Password
        <div class="pw-wrap">
          <input name="password" type="password" required autocomplete="current-password" />
          <button type="button" class="pw-toggle" aria-label="Show password">👁</button>
        </div>
      </label>
      <p id="loginError" class="form-error" hidden></p>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
    <p class="login-links"><button type="button" id="forgotLink" class="linkbtn">Forgot password?</button></p>

    <!-- Forgot-password: request a reset link by email or username -->
    <form id="forgotForm" class="form" hidden autocomplete="on">
      <div class="section-label">Reset your password</div>
      <p class="muted" style="margin:0 0 8px;font-size:.85rem">Enter your email (or username). If an account matches, we’ll email you a reset link.</p>
      <label>Email or username
        <input name="identifier" type="text" required autocomplete="username" />
      </label>
      <p id="forgotMsg" class="form-note" hidden></p>
      <p id="forgotError" class="form-error" hidden></p>
      <div style="display:flex;gap:8px">
        <button type="button" id="forgotCancel" class="btn btn-ghost btn-block">Back to sign in</button>
        <button type="submit" class="btn btn-primary btn-block">Send reset link</button>
      </div>
    </form>

    <p class="login-hint muted" id="loginHint"></p>
  </div>
</div>

<!-- APP -->
<div id="appView" hidden>
  <header class="topbar">
    <div class="topbar-left">
      <img class="logo logo-sm" src="logo.svg" alt="Cibes" />
      <span class="topbar-title">Reimbursement Portal</span>
    </div>
    <div class="topbar-right">
      <span id="userBadge" class="user-badge"></span>
      <button id="profileBtn" class="btn btn-indigo-soft btn-sm">Profile</button>
      <button id="accountsBtn" class="btn btn-brand-soft btn-sm" hidden>Manage accounts</button>
      <button id="settingsBtn" class="btn btn-brand-soft btn-sm" hidden>Settings</button>
      <button id="logoutBtn" class="btn btn-danger-ghost btn-sm">Sign out</button>
    </div>
  </header>

  <main class="container">
    <section id="summaryCards" class="cards"></section>

    <section class="toolbar">
      <div class="toolbar-left">
        <input id="searchInput" class="input" type="search" placeholder="Search claim no, name, type…" />
        <select id="statusFilter" class="input">
          <option value="">All statuses</option>
          <option value="submitted">Pending review</option>
          <option value="approved">Approved</option>
          <option value="rejected">Rejected</option>
          <option value="paid">Paid</option>
        </select>
        <select id="deptFilter" class="input"><option value="">All departments</option></select>
        <select id="claimantFilter" class="input"><option value="">All claimants</option></select>
      </div>
      <div class="toolbar-right">
        <button id="exportBtn" class="btn btn-green-soft" hidden>Export CSV</button>
        <button id="newMealBtn" class="btn btn-primary" hidden>New meal allowance</button>
        <button id="newClaimBtn" class="btn btn-primary" hidden>New claim</button>
      </div>
    </section>

    <div id="selectionBar" class="selection-bar" hidden>
      <span id="selCount" class="sel-count"></span>
      <div class="sel-actions">
        <button id="clearSelBtn" class="btn btn-ghost btn-sm" type="button">Clear</button>
        <button id="deleteSelBtn" class="btn btn-danger btn-sm" type="button" hidden>Delete</button>
        <button id="genPdfBtn" class="btn btn-primary btn-sm" type="button">Download PDF</button>
      </div>
    </div>

    <section class="ledger">
      <div class="ledger-head">
        <span class="col-spine"></span>
        <span class="col-check"><input type="checkbox" id="selectAll" aria-label="Select all claims" /></span>
        <span class="col-no">Claim</span>
        <span class="col-name">Claimant</span>
        <span class="col-type">Expense</span>
        <span class="col-date">Date</span>
        <span class="col-amt">Amount</span>
        <span class="col-status">Status</span>
      </div>
      <div id="claimRows"></div>
      <p id="emptyState" class="empty muted" hidden>No claims yet.</p>
    </section>
  </main>
</div>

<!-- DRAWER (claim detail) -->
<div id="drawerScrim" class="scrim" hidden></div>
<aside id="drawer" class="drawer" hidden aria-label="Claim detail"></aside>

<!-- MODAL (forms) -->
<div id="modalScrim" class="scrim" hidden></div>
<div id="modal" class="modal" hidden role="dialog" aria-modal="true"></div>

<!-- MODAL 2 (sub-forms that stack over a modal, e.g. add/edit user) -->
<div id="modal2Scrim" class="scrim scrim-2" hidden></div>
<div id="modal2" class="modal modal-2" hidden role="dialog" aria-modal="true"></div>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
