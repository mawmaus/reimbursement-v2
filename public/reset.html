<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password · Reimbursement Portal</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <img class="logo logo-lg" src="logo.svg" alt="Cibes" />
      <div>
        <h1>Reset password</h1>
        <p class="muted">Choose a new password for your account.</p>
      </div>
    </div>

    <form id="resetForm" class="form">
      <label>New password (min 6 characters)
        <div class="pw-wrap">
          <input name="new_password" type="password" required minlength="6" autocomplete="new-password" />
          <button type="button" class="pw-toggle" aria-label="Show password">👁</button>
        </div>
      </label>
      <label>Confirm new password
        <div class="pw-wrap">
          <input name="confirm_password" type="password" required minlength="6" autocomplete="new-password" />
          <button type="button" class="pw-toggle" aria-label="Show password">👁</button>
        </div>
      </label>
      <p id="resetError" class="form-error" hidden></p>
      <button type="submit" class="btn btn-primary btn-block">Set new password</button>
    </form>

    <div id="resetDone" hidden>
      <p class="form-note">Your password has been reset. You can now sign in with your new password.</p>
      <p style="margin-top:16px"><a class="btn btn-primary btn-block" href="/">Go to sign in</a></p>
    </div>

    <p class="login-hint muted"><a href="/">Back to sign in</a></p>
  </div>
</div>

<script src="reset.js"></script>
</body>
</html>
